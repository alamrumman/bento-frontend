<svg width="680" height="460" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Bento box scroll story mechanism</title>
<desc>Illustration of the six-beat scroll story: a pinned bento box that opens and rotates to reveal compartments as the user scrolls down the page.</desc>

<style>
  text { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; fill: #1F2620; }
  .t  { font-size: 14px; font-weight: 400; }
  .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
  .th { font-size: 14px; font-weight: 500; }
</style>

<rect width="680" height="460" fill="#FAF7F0"/>

<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
  <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="40" y="30" width="20" height="380" rx="4" fill="none" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="50" y1="50" x2="50" y2="390" stroke="#B4B2A9" stroke-width="1.5" stroke-dasharray="4 6"/>
<text class="ts" x="50" y="412" text-anchor="middle">scroll</text>
<line x1="50" y1="396" x2="50" y2="408" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="100" y="40" width="120" height="56" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="160" y="60" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">beat 1</text>
<text class="ts" x="160" y="80" text-anchor="middle" dominant-baseline="central" fill="#712B13">closed box</text>
</g>
<rect x="135" y="105" width="50" height="34" rx="4" fill="none" stroke="#1F2620" stroke-width="1"/>
<line x1="135" y1="113" x2="185" y2="113" stroke="#1F2620" stroke-width="0.5"/>

<line x1="160" y1="96" x2="160" y2="146" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<g>
<rect x="100" y="150" width="120" height="56" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="160" y="170" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">beat 2</text>
<text class="ts" x="160" y="190" text-anchor="middle" dominant-baseline="central" fill="#712B13">lid lifts back</text>
</g>
<rect x="135" y="215" width="50" height="28" rx="4" fill="none" stroke="#1F2620" stroke-width="1"/>
<path d="M135 215 L122 198 L172 198 L185 215" fill="none" stroke="#1F2620" stroke-width="0.8" opacity="0.6"/>

<line x1="160" y1="206" x2="160" y2="256" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<g>
<rect x="100" y="260" width="120" height="56" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="160" y="280" text-anchor="middle" dominant-baseline="central" fill="#412402">beat 3-5</text>
<text class="ts" x="160" y="300" text-anchor="middle" dominant-baseline="central" fill="#633806">rotate, reveal each part</text>
</g>
<rect x="118" y="325" width="20" height="20" rx="3" fill="none" stroke="#1F2620" stroke-width="1"/>
<rect x="150" y="325" width="20" height="20" rx="3" fill="none" stroke="#1F2620" stroke-width="1"/>
<rect x="182" y="325" width="20" height="20" rx="3" fill="none" stroke="#1F2620" stroke-width="1"/>

<line x1="160" y1="316" x2="160" y2="366" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<g>
<rect x="100" y="370" width="120" height="56" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="160" y="390" text-anchor="middle" dominant-baseline="central" fill="#04342C">beat 6</text>
<text class="ts" x="160" y="410" text-anchor="middle" dominant-baseline="central" fill="#085041">full top-down view</text>
</g>

<rect x="290" y="60" width="330" height="340" rx="14" fill="none" stroke="#D8D2C2" stroke-width="0.5"/>
<text class="ts" x="305" y="84">pinned hero viewport</text>

<g>
<circle cx="455" cy="170" r="58" fill="none" stroke="#1F2620" stroke-width="1.5"/>
<path d="M455 112 A58 58 0 0 1 455 228" fill="none" stroke="#C84B31" stroke-width="3" opacity="0.85"/>
<rect x="425" y="155" width="60" height="30" rx="5" fill="none" stroke="#1F2620" stroke-width="1"/>
<line x1="425" y1="163" x2="485" y2="163" stroke="#1F2620" stroke-width="0.5"/>
<text class="ts" x="455" y="252" text-anchor="middle">box stays fixed</text>
</g>

<line x1="513" y1="170" x2="560" y2="170" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="2 3"/>
<circle cx="513" cy="170" r="2" fill="#1F2620"/>
<text class="ts" x="305" y="298">label tags stamp in</text>
<text class="ts" x="305" y="314">per beat, kitchen-</text>
<text class="ts" x="305" y="330">ticket style</text>

<g>
<rect x="305" y="345" width="90" height="28" rx="4" fill="none" stroke="#7C8B6F" stroke-width="1.2" transform="rotate(-3 350 359)"/>
<text class="ts" x="350" y="360" text-anchor="middle" dominant-baseline="central" fill="#7C8B6F" transform="rotate(-3 350 359)">PROTEIN</text>
</g>

<text class="ts" x="455" y="280" text-anchor="middle">content + progress</text>
<text class="ts" x="455" y="296" text-anchor="middle">drive the rotation</text>
</svg>
